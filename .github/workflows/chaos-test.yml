name: PostgreSQL Chaos Regression Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      pg_ref:
        description: 'PostgreSQL git ref to test (branch, tag, or SHA)'
        required: false
        default: 'master'
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'

env:
  PG_REF: ${{ github.event.inputs.pg_ref || 'master' }}

jobs:
  chaos-test:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout chaos-test repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc g++ make pkg-config \
            libreadline-dev zlib1g-dev flex bison \
            libxml2-dev libxml2-utils libxslt1-dev \
            libssl-dev libkrb5-dev libgss-dev \
            libldap2-dev libpam0g-dev \
            libselinux1-dev libsepol-dev \
            libsystemd-dev \
            liblz4-dev libzstd-dev \
            libicu-dev \
            libnuma-dev \
            libcurl4-openssl-dev \
            liburing-dev \
            perl libperl-dev libipc-run-perl \
            python3 python3-dev \
            tcl tcl-dev \
            gettext \
            xsltproc docbook-xsl docbook-xml \
            uuid-dev \
            libpq-dev \
            gdb
          # Enable core dumps
          ulimit -c unlimited
          sudo sysctl -w kernel.core_pattern=core.%p

      - name: Clone upstream PostgreSQL
        run: |
          git clone --depth=1 --branch "$PG_REF" \
            https://github.com/postgres/postgres.git pg-src

      # ---- Apply patches: fail immediately if they don't apply ----
      - name: Apply chaos patches
        id: apply_patches
        working-directory: pg-src
        run: |
          PATCH_DIR="../patches/master"
          if [ ! -d "$PATCH_DIR" ] || [ -z "$(ls -A "$PATCH_DIR"/*.patch 2>/dev/null)" ]; then
            echo "::error::No patches found in $PATCH_DIR"
            exit 1
          fi
          for patch in "$PATCH_DIR"/*.patch; do
            BASENAME=$(basename "$patch")
            echo "--- Checking: $BASENAME ---"
            if ! git apply --check "$patch" 2>/tmp/patch_error_${BASENAME}.txt; then
              echo "::error::Patch $BASENAME does not apply cleanly"
              cat /tmp/patch_error_${BASENAME}.txt
              echo "patch_failed=true" >> $GITHUB_OUTPUT
              echo "failed_patch=$BASENAME" >> $GITHUB_OUTPUT
              exit 1
            fi
            echo "--- Applying: $BASENAME ---"
            git apply --stat "$patch"
            git apply "$patch"
          done
          echo "patch_failed=false" >> $GITHUB_OUTPUT
          echo "All chaos patches applied successfully."

      - name: Send patch failure email
        if: failure() && steps.apply_patches.outputs.patch_failed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "pg-chaos-test: patch no longer applies to ${{ env.PG_REF }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Actions <github-actions@github.com>
          body: |
            The chaos patch set no longer applies cleanly to PostgreSQL ${{ env.PG_REF }}.

            Failed patch: ${{ steps.apply_patches.outputs.failed_patch }}

            This likely means upstream changed code in add_path / add_partial_path
            (pathnode.c) or BackgroundWorkerMain (bgworker.c). The patches need
            to be regenerated.

            Workflow: ${{ github.workflow }}
            Repository: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            Automated message from GitHub Actions.

      - name: Configure
        working-directory: pg-src
        run: |
          ./configure \
            --enable-cassert \
            --enable-debug \
            --enable-tap-tests \
            --with-icu \
            --with-openssl \
            --with-libxml \
            --with-libxslt \
            --with-gssapi \
            --with-ldap \
            --with-pam \
            --with-selinux \
            --with-systemd \
            --with-lz4 \
            --with-zstd \
            --with-perl \
            --with-python \
            --with-tcl \
            --with-uuid=e2fs \
            --with-libcurl \
            --prefix=$HOME/pg-install

      - name: Build
        working-directory: pg-src
        run: make -j$(nproc)

      - name: Install
        working-directory: pg-src
        run: make install

      - name: Run check-world (keep going on failure)
        working-directory: pg-src
        # -k = keep going after failures; don't fail the step yet.
        continue-on-error: true
        run: |
          ulimit -c unlimited
          make check-world -k -j$(nproc) 2>&1 | tee check-world.log

      # ---- Success factor 1: no +ERROR in diffs ----
      - name: "Check 1: Scan diffs for +ERROR"
        id: check_errors
        working-directory: pg-src
        run: |
          chmod +x ../check_diffs_errors.sh
          ../check_diffs_errors.sh . | tee /tmp/errors_report.txt

          if grep -q '=== ' /tmp/errors_report.txt; then
            echo "errors_found=true" >> $GITHUB_OUTPUT
          else
            echo "errors_found=false" >> $GITHUB_OUTPUT
          fi

      # ---- Success factor 2: no core files, assertions, or segfaults ----
      - name: "Check 2: Scan for crashes, assertions, segfaults"
        id: check_crashes
        working-directory: pg-src
        run: |
          chmod +x ../check_crashes.sh
          ../check_crashes.sh . | tee /tmp/crashes_report.txt

          if grep -q 'RESULT: Crash evidence detected' /tmp/crashes_report.txt; then
            echo "crashes_found=true" >> $GITHUB_OUTPUT
          else
            echo "crashes_found=false" >> $GITHUB_OUTPUT
          fi

      # ---- Collect artifacts (always, even on success) ----
      - name: Collect regression artifacts
        if: always()
        working-directory: pg-src
        run: |
          mkdir -p /tmp/chaos-artifacts/diffs
          mkdir -p /tmp/chaos-artifacts/logs

          # Gather all .diffs files
          find . -name '*.diffs' -exec cp --parents {} /tmp/chaos-artifacts/diffs/ \; 2>/dev/null || true

          # Gather postmaster and TAP test logs with crash evidence
          find . -name 'postmaster.log' -exec cp --parents {} /tmp/chaos-artifacts/logs/ \; 2>/dev/null || true
          find . -path '*/tmp_check/*/log/*.log' -exec cp --parents {} /tmp/chaos-artifacts/logs/ \; 2>/dev/null || true

          # Gather core dumps if any
          find . -name 'core' -o -name 'core.*' 2>/dev/null | while read core; do
            cp --parents "$core" /tmp/chaos-artifacts/ 2>/dev/null || true
          done

          # Copy reports
          cp -f check-world.log /tmp/chaos-artifacts/ 2>/dev/null || true
          cp -f /tmp/errors_report.txt /tmp/chaos-artifacts/ 2>/dev/null || true
          cp -f /tmp/crashes_report.txt /tmp/chaos-artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-results-${{ github.run_number }}
          path: /tmp/chaos-artifacts/
          retention-days: 30

      # ---- Write job summary ----
      - name: Write job summary
        if: always()
        run: |
          echo "## Chaos Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PostgreSQL ref:** \`$PG_REF\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Check 1: Regression diff errors (+ERROR)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_errors.outputs.errors_found }}" = "true" ]; then
            echo ":x: **FAILED** — +ERROR lines found in regression diffs" >> $GITHUB_STEP_SUMMARY
          else
            echo ":white_check_mark: **PASSED** — no +ERROR in diffs" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Check 2: Crashes / assertions / segfaults" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_crashes.outputs.crashes_found }}" = "true" ]; then
            echo ":x: **FAILED** — crash evidence detected" >> $GITHUB_STEP_SUMMARY
          else
            echo ":white_check_mark: **PASSED** — no crashes detected" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "<details><summary>Error report</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -200 /tmp/errors_report.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(empty)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "<details><summary>Crash report</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -200 /tmp/crashes_report.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(empty)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      # ---- Final verdict ----
      - name: Final verdict
        run: |
          ERRORS="${{ steps.check_errors.outputs.errors_found }}"
          CRASHES="${{ steps.check_crashes.outputs.crashes_found }}"

          if [ "$ERRORS" = "true" ] && [ "$CRASHES" = "true" ]; then
            echo "::error::FAILED: Both +ERROR in diffs AND crash evidence detected"
            exit 1
          elif [ "$ERRORS" = "true" ]; then
            echo "::error::FAILED: +ERROR lines found in regression diffs"
            exit 1
          elif [ "$CRASHES" = "true" ]; then
            echo "::error::FAILED: Crash evidence (core files, assertions, or segfaults) detected"
            exit 1
          else
            echo "SUCCESS: All chaos regression tests passed — no errors, no crashes."
          fi

      - name: Send test failure email
        if: failure() && steps.apply_patches.outputs.patch_failed != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "pg-chaos-test: regression failures on ${{ env.PG_REF }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Actions <github-actions@github.com>
          body: |
            The chaos regression test run against PostgreSQL ${{ env.PG_REF }} has FAILED.

            Results:
            - +ERROR in diffs: ${{ steps.check_errors.outputs.errors_found }}
            - Crashes detected: ${{ steps.check_crashes.outputs.crashes_found }}

            Workflow: ${{ github.workflow }}
            Repository: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Artifacts (diffs, logs, core dumps) are available for 30 days at the run URL.

            ---
            Automated message from GitHub Actions.
